        function setLastSeen() {

            }

        function isEnter(event) {
            if (event.keyCode == 13) {
                sendMsg();
            }
        }

        function sendMsg() {
            var input = document.getElementById('inputMSG');
            var ti = input.value;
            if (!ti || ti.trim() === '') {
                return;
            }
            var date = new Date();
            var myLI = document.createElement('li');
            var myDiv = document.createElement('div');
            var greendiv = document.createElement('div');
            var dateLabel = document.createElement('label');
            dateLabel.innerText = date.getHours() + ':' + date.getMinutes();
            myDiv.setAttribute('class', 'sent');
            greendiv.setAttribute('class', 'green');
            dateLabel.setAttribute('class', 'dateLabel');
            greendiv.innerText = ti;
            myDiv.appendChild(greendiv);
            myLI.appendChild(myDiv);
            greendiv.appendChild(dateLabel);
            document.getElementById('listUL').appendChild(myLI);
            var s = document.getElementById('chatting');
            s.scrollTop = s.scrollHeight;
            input.value = '';
            playSound();

            setTimeout(function () { callApiChat(ti); }, 500);
        }

        async function callApiChat(inputText) {
            var lastSeen = document.getElementById('lastseen');
            lastSeen.innerText = 'typing...';
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ input: inputText })
                });

                if (!response.ok) {
                    throw new Error('Server responded with status ' + response.status);
                }

                const data = await response.json();
                const reply = data.response || data.error || 'Sorry, I could not get a reply right now.';
                sendTextMessage(reply);
            } catch (error) {
                console.error('callApiChat error:', error);
                sendTextMessage('Sorry, I am having trouble connecting to the AI service. Please try again.');
            } finally {
                setLastSeen();
            }
        }

        function waitAndResponce(inputText) {
            callApiChat(inputText);
        }

        function clearChat() {
            document.getElementById('listUL').innerHTML = '';

        function clearChat() {
